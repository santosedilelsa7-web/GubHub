<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gubhub</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Arial Black', Gadget, sans-serif;
        }

        body {
            background-color: #121212;
            color: #FFFFFF;
            height: 100vh;
            overflow: hidden;
        }

        /* TELA DE LOGIN */
        #login-screen {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #1a1a1a;
            padding: 20px;
        }

        .login-box {
            background-color: #0b0b0b;
            padding: 30px;
            border-radius: 10px;
            position: relative;
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .login-box::after {
            content: '';
            position: absolute;
            top: 0; right: -5px; bottom: 0;
            width: 5px;
            background: linear-gradient(to bottom, #0000ff, #ff007f, #ffaa00);
            border-radius: 0 10px 10px 0;
        }

        .login-box h2 {
            margin-bottom: 20px;
            font-size: 1.3rem;
            letter-spacing: 1px;
        }

        .login-box input[type="text"], .login-box input[type="password"] {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background-color: #222;
            border: 1px solid #444;
            color: white;
            border-radius: 5px;
        }

        .avatar-crop-area {
            margin: 15px 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .preview-container {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 2px dashed #ff007f;
            overflow: hidden;
            position: relative;
            background: #222;
        }

        #avatar-preview {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scale(1);
        }

        .file-label {
            background: #333;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.8rem;
            display: inline-block;
        }

        .login-box button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(to right, #0000ff, #ff007f);
            border: none;
            color: white;
            font-weight: bold;
            cursor: pointer;
            border-radius: 5px;
            margin-top: 15px;
        }

        /* APP PRINCIPAL */
        #app-screen {
            display: none;
            grid-template-rows: 60px 1fr;
            height: 100vh;
        }

        header {
            background-color: #0b0b0b;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 10px;
            border-bottom: 2px solid #222;
            z-index: 15;
            gap: 10px;
        }

        .logo { color: #ffcc00; font-size: 1.5rem; flex-shrink: 0; }
        
        /* BARRA DE PESQUISA ADICIONADA */
        .search-container {
            flex: 1;
            max-width: 200px;
            position: relative;
        }

        .search-container input {
            width: 100%;
            padding: 6px 10px;
            background-color: #222;
            border: 1px solid #444;
            color: white;
            border-radius: 20px;
            font-size: 0.75rem;
            font-family: sans-serif;
        }

        .user-nav {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            flex-shrink: 0;
        }

        .user-nav span {
            font-size: 0.8rem;
            max-width: 80px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .avatar {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            background-color: #444;
            overflow: hidden;
        }

        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .main-container {
            display: flex;
            position: relative;
            height: 100%;
            overflow: hidden;
        }
        
                /* GAVETA DE AMIGOS */
        aside {
            position: absolute;
            top: 0;
            left: -290px;
            width: 260px;
            height: 100%;
            background-color: #1a1a1a;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            transition: left 0.3s ease;
            z-index: 25;
            border-right: 2px solid #222;
        }

        aside.open {
            left: 0;
        }

        .friends-section h3 {
            font-size: 0.8rem;
            color: #666;
            margin-bottom: 10px;
        }

        .friend-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px;
            border-radius: 5px;
            cursor: pointer;
        }

        /* LINHA DEGRADÊ NO LADO DIREITO DA TELA */
        .gradient-line-right {
            position: fixed;
            right: 0;
            top: 60px;
            bottom: 0;
            width: 6px;
            background: linear-gradient(to bottom, #0000ff, #ff007f, #ffaa00);
            z-index: 30;
        }

        /* FEED PRINCIPAL */
        main {
            flex: 1;
            background-color: #1a1a1a;
            overflow-y: auto;
            padding: 20px 20px 100px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .create-post {
            background-color: #0b0b0b;
            width: 100%;
            max-width: 500px;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            border-left: 3px solid #ff007f;
        }

        .create-post textarea {
            width: 100%;
            background: #222;
            border: none;
            color: white;
            padding: 10px;
            border-radius: 5px;
            resize: none;
            height: 60px;
            margin-bottom: 10px;
        }

        .post-actions-input {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* CARD DE POSTAGEM */
        .post-card {
            background-color: #0b0b0b;
            width: 100%;
            max-width: 500px;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
        }

        .post-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 12px;
        }

        .post-content-media {
            width: 100%;
            max-height: 400px;
            border-radius: 5px;
            object-fit: cover;
            background-color: #222;
        }

        .post-caption {
            margin-top: 10px;
            font-size: 0.9rem;
            text-transform: uppercase;
        }

        /* BOTÕES DE INTERAÇÃO */
        .post-footer-buttons {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 20px;
            margin-top: 15px;
            padding-top: 10px;
            border-top: 1px solid #222;
        }

        .btn-action-custom {
            background: none;
            border: none;
            color: #ffffff;
            font-size: 1.4rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
            font-family: sans-serif;
        }

        .btn-action-custom.liked {
            color: #ff007f;
        }

        /* EXPANSÃO DE COMENTÁRIOS */
        .comments-section-area {
            display: none;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px dashed #333;
            text-align: left;
        }

        .comments-list {
            max-height: 150px;
            overflow-y: auto;
            margin-bottom: 10px;
        }

        .comment-item {
            font-size: 0.8rem;
            background: #222;
            padding: 6px 10px;
            border-radius: 5px;
            margin-bottom: 5px;
            font-family: sans-serif;
        }

        .comment-item span {
            font-family: 'Arial Black', sans-serif;
            color: #ffaa00;
            margin-right: 5px;
        }

        .comment-input-block {
            display: flex;
            gap: 5px;
        }

        .comment-input-block input {
            flex: 1;
            background: #151515;
            border: 1px solid #333;
            color: white;
            padding: 6px;
            border-radius: 4px;
            font-family: sans-serif;
        }

        .comment-input-block button {
            background: #ff007f;
            border: none;
            color: white;
            padding: 0 10px;
            border-radius: 4px;
            cursor: pointer;
        }

        /* BOTÃO FLUTUANTE AJUSTADO */
        .btn-trigger-menu {
            position: fixed;
            bottom: 25px;
            left: 25px;
            background: #0b0b0b;
            border: 2px solid #ff007f;
            color: white;
            width: 55px;
            height: 55px;
            border-radius: 50%;
            font-size: 1.4rem;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 40;
            box-shadow: 0 4px 15px rgba(0,0,0,0.6);
        }

        /* MODAL */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .modal-content {
            background: #0b0b0b;
            padding: 25px;
            border-radius: 10px;
            border: 2px solid #ffaa00;
            max-width: 400px;
            width: 90%;
            text-align: center;
        }

        .modal-close {
            background: #ffaa00;
            border: none;
            padding: 8px 20px;
            color: black;
            font-weight: bold;
            cursor: pointer;
            border-radius: 5px;
            margin-top: 15px;
        }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-box">
            <h2>CRIAR PERFIL & ENTRAR</h2>
            <input type="text" id="login-user" placeholder="Nome de usuário" required>
            <input type="password" id="login-pass" placeholder="Senha" required>
            
            <div class="avatar-crop-area">
                <p style="font-size:0.8rem; color:#aaa;">Sua foto de perfil:</p>
                <div class="preview-container">
                    <img id="avatar-preview" src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='100' height='100' viewBox='0 0 24 24'><circle cx='12' cy='12' r='10' fill='%23444'/></svg>">
                </div>
                <label class="file-label" for="avatar-file">📁 Galeria</label>
                <input type="file" id="avatar-file" accept="image/*" style="display:none;" onchange="carregarAvatar(event)">
                
                <div id="zoom-control" style="display:none; width: 100%;">
                    <input type="range" id="avatar-zoom" min="1" max="3" step="0.1" value="1" oninput="ajustarZoom(this.value)" style="width:80%;">
                </div>
            </div>

            <button onclick="efetuarLogin()">LOGAR</button>
        </div>
    </div>

    <div id="app-screen">
<header>
    <div class="logo" onclick="limparTudoEDeslogar()" style="cursor:pointer;">
        <img src="https://i.imgur.com/vbqyqUl.png" alt="Logo" style="height: 45px; width: auto; object-fit: contain;">
    </div>
    
    <div class="search-container">
        <input type="text" id="search-user-input" placeholder="🔍 Buscar nickname..." oninput="filtrarPesquisa(this.value)">
    </div>

    <div class="user-nav" onclick="abrirMeuPerfil()">
        <span id="current-username">USER</span>
        <div class="avatar"><img id="my-profile-avatar" src=""></div>
    </div>
</header>

        </header>

        <div class="main-container">
            <aside id="sidebar-friends">
                <div class="friends-section">
                    <h3>AMIGOS</h3>
                    <div id="friends-list">
                        <p id="no-friends" style="font-size:0.7rem; color:#555; text-align:center; padding:10px;">Nenhum amigo ainda.</p>
                    </div>
                </div>
            </aside>

            <div class="gradient-line-right"></div>

            <main id="feed-container">
                <div class="create-post">
                    <textarea id="post-text" placeholder="No que você está pensando?"></textarea>
                    <div class="post-actions-input">
                        <label class="file-label" for="post-file">📁 Imagem / Vídeo</label>
                        <input type="file" id="post-file" accept="image/*,video/*" style="display:none;" onchange="verificarMidiaCarregada()">
                        <button onclick="criarNovoPost()" style="background:#ff007f; border:none; color:white; padding:6px 15px; border-radius:5px; cursor:pointer;">POSTAR</button>
                    </div>
                </div>

                <div id="timeline" style="width: 100%; display:flex; flex-direction:column; align-items:center;"></div>
            </main>
        </div>
    </div>

    <button class="btn-trigger-menu" onclick="toggleAmigos()">...</button>

    <div id="custom-modal" class="modal">
        <div class="modal-content">
            <p id="modal-text">Mensagem</p>
            <button class="modal-close" onclick="fecharModal()">OK</button>
        </div>
    </div>

    <script>
        let usuarioLogado = localStorage.getItem('social_usuarioLogado') || null;
        let fotoPerfilBase64 = localStorage.getItem('social_fotoPerfil') || "";
        let zoomAtual = localStorage.getItem('social_zoomAtual') || 1;
        
        // Se for a primeira vez abrindo o app, cria posts demonstrativos de outros usuários para simular a rede
        let postsIniciais = [
            {
                id: 1,
                username: "JUNIM789",
                avatar: "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='100' height='100' viewBox='0 0 24 24'><circle cx='12' cy='12' r='10' fill='%23ff007f'/></svg>",
                avatarZoom: 1,
                caption: "Alguém joga Blox Fruits hoje mais tarde?",
                usuariosQueCurtiram: [],
                comments: [{autor: "ROBLOX_FAN", texto: "Eu topo!"}],
                blocked: false,
                media: null,
                mediaType: "image"
            },
            {
                id: 2,
                username: "GOKU_PRO",
                avatar: "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='100' height='100' viewBox='0 0 24 24'><circle cx='12' cy='12' r='10' fill='%23ffaa00'/></svg>",
                avatarZoom: 1,
                caption: "Essa figura é muito boa!",
                usuariosQueCurtiram: [],
                comments: [],
                blocked: false,
                media: "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='300' height='200' viewBox='0 0 24 24' fill='%23222'><rect width='100%25' height='100%25'/><text x='50%25' y='50%25' fill='white' dominant-baseline='middle' text-anchor='middle'>[ Meme Image ]</text></svg>",
                mediaType: "image"
            }
        ];

        let posts = JSON.parse(localStorage.getItem('social_posts'));
        if(!posts || posts.length === 0) {
            posts = postsIniciais;
            localStorage.setItem('social_posts', JSON.stringify(posts));
        }

        window.onload = function() {
            if (usuarioLogado && fotoPerfilBase64) {
                mostrarApp();
            }
        };

        function carregarAvatar(event) {
            let reader = new FileReader();
            reader.onload = function() {
                document.getElementById('avatar-preview').src = reader.result;
                fotoPerfilBase64 = reader.result;
                document.getElementById('zoom-control').style.display = 'block';
            }
            reader.readAsDataURL(event.target.files[0]);
        }

        function limparTudoEDeslogar() {
            if(confirm("Deseja deslogar e limpar os dados locais?")) {
                localStorage.clear();
                window.location.reload();
            }
        }

        function ajustarZoom(valor) {
            zoomAtual = valor;
            document.getElementById('avatar-preview').style.transform = `scale(${valor})`;
        }

        function mostrarModal(texto) {
            document.getElementById('modal-text').innerText = texto;
            document.getElementById('custom-modal').style.display = 'flex';
        }

        function fecharModal() {
            document.getElementById('custom-modal').style.display = 'none';
        }

        function toggleAmigos() {
            document.getElementById('sidebar-friends').classList.toggle('open');
        }

        function verificarMidiaCarregada() {
            let fileInput = document.getElementById('post-file');
            if(fileInput.files[0]) {
                mostrarModal("Mídia anexada com sucesso!");
            }
        }

        // FUNÇÃO DE FILTRAR POR NICKNAME (BARRA DE PESQUISA)
        function filtrarPesquisa(valor) {
            let termo = valor.trim().toUpperCase();
            if(termo === "") {
                renderizarFeed();
            } else {
                renderizarFeed(termo, true);
            }
        }

        function efetuarLogin() {
            let user = document.getElementById('login-user').value.trim();
            if(user === "") { mostrarModal("Preencha o usuário!"); return; }
            if(!fotoPerfilBase64) { mostrarModal("Selecione sua foto de perfil!"); return; }

            usuarioLogado = user.toUpperCase();
            
            localStorage.setItem('social_usuarioLogado', usuarioLogado);
            localStorage.setItem('social_fotoPerfil', fotoPerfilBase64);
            localStorage.setItem('social_zoomAtual', zoomAtual);

            mostrarApp();
        }

        function mostrarApp() {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('app-screen').style.display = 'grid';
            document.getElementById('current-username').innerText = usuarioLogado;
            
            let meuAvatarImg = document.getElementById('my-profile-avatar');
            meuAvatarImg.src = fotoPerfilBase64;
            meuAvatarImg.style.transform = `scale(${zoomAtual})`;

            renderizarFeed();
        }

        function salvarPostsNoStorage() {
            localStorage.setItem('social_posts', JSON.stringify(posts));
        }

        function renderizarFeed(filtroUsuario = null, ehPesquisaAtiva = false) {
            const timeline = document.getElementById('timeline');
            timeline.innerHTML = "";

            if(filtroUsuario && !ehPesquisaAtiva) {
                let headerPerfil = document.createElement('div');
                headerPerfil.style.cssText = "width:100%; max-width:500px; margin-bottom:15px; display:flex; justify-content:space-between; align-items:center;";
                let info = `<span>Perfil de: ${filtroUsuario}</span>`;
                if(filtroUsuario !== usuarioLogado) {
                    info += ` <button onclick="solicitarAmizade('${filtroUsuario}')" style="background:#ffaa00; border:none; padding:5px 10px; cursor:pointer;">+ Amizade</button>`;
                }
                headerPerfil.innerHTML = info + ` <button onclick="renderizarFeed()" style="color:#ff007f; background:none; border:none; cursor:pointer;">Voltar</button>`;
                timeline.appendChild(headerPerfil);
            }

            let postsFiltrados = posts.filter(p => !p.blocked);
            
            if(filtroUsuario) {
                if(ehPesquisaAtiva) {
                    // Na pesquisa ativa, mostra posts que CONTÉM a palavra digitada no nickname
                    postsFiltrados = postsFiltrados.filter(p => p.username.includes(filtroUsuario));
                } else {
                    postsFiltrados = postsFiltrados.filter(p => p.username === filtroUsuario);
                }
            }

            if(postsFiltrados.length === 0) {
                timeline.innerHTML += `<p style="color:#444; margin-top:20px; font-size:0.8rem;">NENHUM LOG ENCONTRADO</p>`;
            }

            postsFiltrados.forEach(post => {
                let postDiv = document.createElement('div');
                postDiv.className = "post-card";
                
                let mediaTag = post.media ? (post.mediaType === "video" ? `<video class="post-content-media" src="${post.media}" controls></video>` : `<img class="post-content-media" src="${post.media}">`) : "";

                if(!post.usuariosQueCurtiram) post.usuariosQueCurtiram = [];
                if(!post.comments) post.comments = [];

                let coracaoIcone = post.usuariosQueCurtiram.includes(usuarioLogado) ? "♥" : "♡";
                let classeLiked = post.usuariosQueCurtiram.includes(usuarioLogado) ? "liked" : "";

                postDiv.innerHTML = `
                    <div class="post-header">
                        <div class="avatar"><img src="${post.avatar}" style="transform: scale(${post.avatarZoom || 1});"></div>
                        <div class="username" onclick="verPerfil('${post.username}')" style="cursor:pointer; font-size:0.9rem;">${post.username}</div>
                    </div>
                    ${mediaTag}
                    <div class="post-caption">${post.caption}</div>
                    <div class="post-footer-buttons">
                        <button class="btn-action-custom ${classeLiked}" onclick="curtirPost(${post.id})">
                            <span style="font-size:1.6rem; line-height:1;">${coracaoIcone}</span> 
                            <span style="font-size:1rem;">${post.usuariosQueCurtiram.length}</span>
                        </button>
                        <button class="btn-action-custom" onclick="toggleComentarios(${post.id})">
                            <span style="font-size:1.5rem;">⚲</span>
                        </button>
                        <button class="btn-action-custom" onclick="bloquearPost(${post.id})" style="color: #666;">⊘</button>
                    </div>

                    <div class="comments-section-area" id="comments-box-${post.id}">
                        <div class="comments-list" id="comments-list-${post.id}"></div>
                        <div class="comment-input-block">
                            <input type="text" id="comment-input-${post.id}" placeholder="Escreva um comentário...">
                            <button onclick="adicionarComentario(${post.id})">OK</button>
                        </div>
                    </div>
                `;
                timeline.appendChild(postDiv);
                atualizarListaComentariosVisuais(post.id);
            });
        }

        function criarNovoPost() {
            let texto = document.getElementById('post-text').value;
            let fileInput = document.getElementById('post-file');
            
            if(!texto && !fileInput.files[0]) return;

            let procederCriacao = (mediaData, type) => {
                let novoPost = {
                    id: Date.now(),
                    username: usuarioLogado,
                    avatar: fotoPerfilBase64,
                    avatarZoom: zoomAtual,
                    caption: texto,
                    usuariosQueCurtiram: [],
                    comments: [],
                    blocked: false,
                    media: mediaData,
                    mediaType: type
                };

                posts.unshift(novoPost);
                salvarPostsNoStorage();
                document.getElementById('post-text').value = "";
                fileInput.value = "";
                renderizarFeed();
            };

            if(fileInput.files[0]) {
                let file = fileInput.files[0];
                let type = file.type.includes('video') ? 'video' : 'image';
                
                let reader = new FileReader();
                reader.onload = function() {
                    procederCriacao(reader.result, type);
                }
                reader.readAsDataURL(file);
            } else {
                procederCriacao(null, "image");
            }
        }

        function curtirPost(id) {
            let post = posts.find(p => p.id === id);
            if(post) {
                if(!post.usuariosQueCurtiram) post.usuariosQueCurtiram = [];
                let index = post.usuariosQueCurtiram.indexOf(usuarioLogado);
                if(index === -1) {
                    post.usuariosQueCurtiram.push(usuarioLogado);
                } else {
                    post.usuariosQueCurtiram.splice(index, 1);
                }
                salvarPostsNoStorage();
                renderizarFeed();
            }
        }

        function toggleComentarios(id) {
            let box = document.getElementById(`comments-box-${id}`);
            box.style.display = (box.style.display === "block") ? "none" : "block";
        }

        function adicionarComentario(id) {
            let input = document.getElementById(`comment-input-${id}`);
            let texto = input.value.trim();
            if(texto === "") return;

            let post = posts.find(p => p.id === id);
            if(post) {
                if(!post.comments) post.comments = [];
                post.comments.push({
                    autor: usuarioLogado,
                    texto: texto
                });
                salvarPostsNoStorage();
                input.value = "";
                atualizarListaComentariosVisuais(id);
            }
        }

        function atualizarListaComentariosVisuais(id) {
            let post = posts.find(p => p.id === id);
            let listContainer = document.getElementById(`comments-list-${id}`);
            if(!listContainer) return;

            listContainer.innerHTML = "";
            if(!post.comments || post.comments.length === 0) {
                listContainer.innerHTML = `<p style="font-size:0.7rem; color:#555;">Nenhum comentário.</p>`;
                return;
            }

            post.comments.forEach(c => {
                listContainer.innerHTML += `
                    <div class="comment-item">
                        <span>${c.autor}:</span>${c.texto}
                    </div>
                `;
            });
        }

        function bloquearPost(id) {
            let post = posts.find(p => p.id === id);
            if(post) { 
                post.blocked = true; 
                salvarPostsNoStorage();
                renderizarFeed(); 
            }
        }

        function verPerfil(username) { 
            document.getElementById('search-user-input').value = "";
            renderizarFeed(username); 
        }
        function abrirMeuPerfil() { 
            document.getElementById('search-user-input').value = "";
            renderizarFeed(usuarioLogado); 
        }

        function solicitarAmizade(nome) {
            mostrarModal(`Pedido de amizade enviado para ${nome}!`);
        }
    </script>
</body>
</html>
